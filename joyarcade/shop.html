<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop — JoyArcade</title>
  <style>
    body{font-family:Inter,system-ui,Arial;margin:0;padding:28px;background:linear-gradient(180deg,#fff7ea,#fdf3e6);color:#08101a}
    .card{max-width:820px;margin:0 auto;background:#fff;padding:16px;border-radius:12px;box-shadow:0 8px 20px rgba(2,6,23,0.06)}
    .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3efe8}
    .price{font-weight:800}
    button{padding:8px 10px;border-radius:8px;border:0;background:linear-gradient(90deg,#2bb3ff,#ffb020);cursor:pointer}
  </style>
</head>
<body>
  <link rel="stylesheet" href="joyarcade.css">
  <script src="joyarcade.js"></script>
  <header style="margin-bottom:12px"><a href="index.html">← Back</a></header>
  <main class="card">
    <h2>Shop</h2>
    <div style="margin-bottom:8px">Coins: <span id="coins">0</span></div>
    <div id="items"></div>
  </main>
  <script>
    const ITEMS = [
      {id:'dark', title:'Dark Mode', cost:10},
      {id:'neon', title:'Neon Theme', cost:15},
      {id:'ai_mood', title:'AI Mood Text', cost:5}
    ];
    function getCoins(){ return (window.JoyArcade && typeof JoyArcade.getCoins === 'function') ? JoyArcade.getCoins() : parseInt(localStorage.getItem('joy_coins')||'0',10); }
    function isUnlocked(id){ return (window.JoyArcade && typeof JoyArcade.isUnlocked === 'function') ? JoyArcade.isUnlocked(id) : !!JSON.parse(localStorage.getItem('joy_shop')||'{}')[id]; }
    function buy(id){ const item = ITEMS.find(x=>x.id===id); if(!item) return; if(getCoins() < item.cost) return alert('Not enough coins'); if(window.JoyArcade && typeof JoyArcade.unlockItem === 'function'){ const ok = JoyArcade.unlockItem(id, item.cost); if(!ok) return alert('Purchase failed (already unlocked or insufficient coins)'); render(); } else { localStorage.setItem('joy_coins', String(getCoins()-item.cost)); const s = JSON.parse(localStorage.getItem('joy_shop')||'{}'); s[id]=true; localStorage.setItem('joy_shop', JSON.stringify(s)); render(); }
    }
    function render(){ document.getElementById('coins').textContent = getCoins(); const out = document.getElementById('items'); out.innerHTML=''; ITEMS.forEach(it=>{ const r = document.createElement('div'); r.className='row'; r.innerHTML = `<div><strong>${it.title}</strong><div style="font-size:13px;color:#57606a">${it.cost} coins</div></div><div class="price">${isUnlocked(it.id)?'Unlocked':`<button data-id="${it.id}">Buy</button>`}</div>`; out.appendChild(r); }); document.querySelectorAll('button[data-id]').forEach(b=>b.addEventListener('click',()=>{ buy(b.dataset.id); })); }
    // Wait for JoyArcade to initialize if necessary
    if(window.JoyArcade){ render(); } else { document.addEventListener('DOMContentLoaded', render); }
  </script>
</body>
</html>
